<div id="custom-modern-form" class="modern-form-wrapper">
  <div class="power-pages-form-container">
    <div class="ppFlexContainer">
      {% entityform name: 'Novos Anexos' %}
    </div>
  </div>
</div>

<script>
(function () {
  let usuarioSelecionouArquivo = false;
  let jaSubmeteu = false;
  let jaAvisouPaiCarregando = false;

  function avisarPai(tipo) {
    const params = new URLSearchParams(window.location.search);
    const recordId = params.get("id");

    console.log("📤 Filho enviando mensagem:", tipo, recordId);

    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: tipo,
        origem: "ANEXOS_DIRETRIZES",
        RecordID: recordId,
        recordId: recordId
      }, "*");
    }
  }

  function encontrarBotaoSalvar() {
    return (
      document.querySelector("#UpdateButton") ||
      document.querySelector("input[id$='UpdateButton']") ||
      document.querySelector("input[type='submit']") ||
      document.querySelector("button[type='submit']")
    );
  }

  function submeterAutomaticamente() {
    if (!usuarioSelecionouArquivo) return;
    if (jaSubmeteu) return;

    const botaoSalvar = encontrarBotaoSalvar();

    if (!botaoSalvar) {
      console.warn("⚠️ Botão salvar não encontrado.");
      return;
    }

    console.log("💾 Filho submetendo form automaticamente...");

    jaSubmeteu = true;
    botaoSalvar.click();
  }

  document.addEventListener("change", function (e) {
    const inputFile = e.target;

    if (!inputFile) return;
    if (inputFile.tagName.toLowerCase() !== "input") return;
    if (inputFile.type !== "file") return;
    if (!inputFile.files || inputFile.files.length === 0) return;

    console.log("📎 Arquivo selecionado:", inputFile.files[0].name);

    usuarioSelecionouArquivo = true;

    if (!jaAvisouPaiCarregando) {
      jaAvisouPaiCarregando = true;
      avisarPai("ANEXO_DIRETRIZES_CARREGANDO");
    }

    setTimeout(function () {
      submeterAutomaticamente();
    }, 500);
  }, true);

  console.log("✅ Script filho /anexos-diretrizes carregado.");
})();
</script>

<div class="row sectionBlockLayout text-start" style="display: flex; flex-wrap: wrap; min-height: auto; margin: 0px; padding: 0px; max-width: none; width: 100%;">
  <div class="container" style="padding: 0px; display: flex; flex-wrap: wrap; margin-top: 0px; margin-right: 0px; margin-bottom: 0px; margin-left: 0px; padding-top: 0px; padding-right: 0px; padding-bottom: 0px; padding-left: 0px; max-width: none; width: 100%;"><div class="col-lg-12 columnBlockLayout" style="flex-grow: 1; display: flex; flex-direction: column; min-width: 250px; margin: 0px; padding: 0px; max-width: none; width: 100%;"></div></div>
</div>
