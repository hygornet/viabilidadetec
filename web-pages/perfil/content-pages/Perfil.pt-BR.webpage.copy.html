<script>
  $(document).ready(function () {

    const campos = [
        "firstname",
        "lastname",
        "emailaddress1",
        "address1_city",
        "address1_postalcode",
        "telephone1"
    ];

    function todosCamposPreenchidos() {
        return campos.every(function (campo) {
            var valor = $("#" + campo).val();
            return valor && valor.trim() !== "";
        });
    }

    function atualizarAviso() {
        if (todosCamposPreenchidos()) {
            $(".aviso-campos-obrigatorios").fadeOut(300);
        } else {
            $(".aviso-campos-obrigatorios").fadeIn(300);
        }
    }

    // Verifica ao carregar a página
    atualizarAviso();

    // Monitora alterações em tempo real em cada campo
    campos.forEach(function (campo) {
        $("#" + campo).on("input change blur", function () {
            atualizarAviso();
        });
    });

});
</script>

<script>
$(document).ready(function () {

  function somenteNumeros(valor) {
    return (valor || "").replace(/\D/g, "");
  }

  function mascaraTelefone(valor) {
    valor = somenteNumeros(valor).substring(0, 11);

    if (valor.length <= 2) {
      return valor.replace(/^(\d{0,2})/, "($1");
    }

    if (valor.length <= 7) {
      return valor.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
    }

    return valor.replace(/^(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
  }

  function mascaraCEP(valor) {
    valor = somenteNumeros(valor).substring(0, 8);

    if (valor.length <= 5) {
      return valor;
    }

    return valor.replace(/^(\d{5})(\d{0,3})/, "$1-$2");
  }

  // TELEFONE
  $("#telephone1").on("input paste keyup", function () {
    this.value = mascaraTelefone(this.value);
  });

  // CEP
  $("#address1_postalcode").on("input paste keyup", function () {
    this.value = mascaraCEP(this.value);
  });

  // Aplica máscara se já vier preenchido
  $("#telephone1").val(mascaraTelefone($("#telephone1").val()));
  $("#address1_postalcode").val(mascaraCEP($("#address1_postalcode").val()));

});


</script>
